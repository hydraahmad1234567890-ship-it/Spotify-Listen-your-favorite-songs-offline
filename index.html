<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Ultra - Premium Integration</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-black: #000000;
            --sidebar-black: #121212;
            --spotify-green: #1DB954;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
            --card-hover: #282828;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-main);
            display: grid;
            grid-template-columns: 240px 1fr;
            grid-template-rows: 1fr 90px;
            height: 100vh;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            background-color: var(--sidebar-black);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-right: 1px solid var(--glass-border);
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            color: var(--spotify-green);
        }

        .nav-item {
            color: var(--text-dim);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 700;
            transition: 0.3s;
            cursor: pointer;
            padding: 8px 0;
        }

        .nav-item:hover,
        .nav-item.active {
            color: white;
        }

        /* --- MAIN VIEW --- */
        .main-view {
            background: linear-gradient(to bottom, #1e1e1e, #121212);
            overflow-y: auto;
            padding: 20px 40px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(18, 18, 18, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px 0;
        }

        .search-container {
            position: relative;
            width: 350px;
        }

        .search-container input {
            width: 100%;
            padding: 10px 40px;
            border-radius: 500px;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            color: white;
        }

        .search-container i {
            position: absolute;
            left: 15px;
            top: 12px;
            color: var(--text-dim);
        }

        /* --- THE PLAYLIST EMBED SECTION --- */
        .playlist-section {
            margin-top: 30px;
        }

        .embed-container {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: 0.3s;
        }

        .embed-container:hover {
            border-color: var(--spotify-green);
        }

        /* --- PLAYER BAR --- */
        .player-bar {
            grid-column: 1 / -1;
            background: #000;
            border-top: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .current-track {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 300px;
        }

        .current-track img {
            width: 56px;
            border-radius: 4px;
        }

        .controls {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .btn-row {
            display: flex;
            gap: 20px;
            align-items: center;
            font-size: 18px;
        }

        .main-play {
            width: 35px;
            height: 35px;
            background: white;
            color: black;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <aside class="sidebar">
        <div class="logo"><i class="fab fa-spotify"></i> Premium Player</div>
        <a class="nav-item active"><i class="fas fa-home"></i> Home</a>
        <a class="nav-item"><i class="fas fa-search"></i> Search</a>
        <a class="nav-item"><i class="fas fa-layer-group"></i> Library</a>
    </aside>

    <main class="main-view">
        <header>
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search your library...">
            </div>
            <button
                style="background: white; border: none; padding: 8px 20px; border-radius: 20px; font-weight: bold; cursor: pointer;">Ahmad
                Khan</button>
        </header>

        <section class="playlist-section">
            <h2 style="margin-bottom: 20px; letter-spacing: -0.5px;">Recommended For You</h2>

            <div class="embed-container">
                <iframe title="Spotify Embed: Recommendation Playlist"
                    src="https://open.spotify.com/embed/playlist/0Xp4X8X39WfoBeY2JAzmkc?utm_source=generator&theme=0"
                    width="100%" height="360" frameBorder="0"
                    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy">
                </iframe>
            </div>
        </section>

        <section style="margin-top: 40px;">
            <h3 style="margin-bottom: 15px;">Recently Played</h3>
            <p style="color: var(--text-dim); font-size: 14px;">Your AI history will appear here as you play tracks.</p>
        </section>
    </main>

    <footer class="player-bar">
        <div class="current-track">
            <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=100" alt="MJ">
            <div>
                <h4 style="font-size: 14px;">They Don't Care About Us</h4>
                <p style="font-size: 12px; color: var(--text-dim);">Michael Jackson</p>
            </div>
        </div>

        <div class="controls">
            <div class="btn-row">
                <i class="fas fa-step-backward" style="cursor: pointer;"></i>
                <button class="main-play"><i class="fas fa-play"></i></button>
                <i class="fas fa-step-forward" style="cursor: pointer;"></i>
            </div>
            <div style="width: 400px; height: 4px; background: #4f4f4f; border-radius: 2px; position: relative;">
                <div style="width: 30%; height: 100%; background: white; border-radius: 2px;"></div>
            </div>
        </div>

        <div style="width: 300px; display: flex; justify-content: flex-end; gap: 15px; color: var(--text-dim);">
            <i class="fas fa-volume-up"></i>
            <div style="width: 100px; height: 4px; background: #4f4f4f; border-radius: 2px; margin-top: 8px;"></div>
        </div>
    </footer>

</body>

</html>
